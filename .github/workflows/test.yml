name: Test CDK

on:
  workflow_call:
  push:
    branches:
      - dev

defaults:
  run:
    working-directory: cdk

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cacge-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

      - name: Test
        run: npm test